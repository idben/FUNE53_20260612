<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementById 的試驗</title>
</head>

<body>
    <div id="aaa">
        <div id="bbb">
            <div id="ccc">123</div>
        </div>
    </div>


    <script>
        let aaa = document.getElementById("aaa");
        console.log(aaa);
        let bbb = document.getElementById("bbb");
        console.log(bbb);
        let ccc = document.getElementById("ccc");
        console.log(ccc);

        ccc.innerHTML = "<h1>正 2</h1>"

    </script>
</body>

</html>
