<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        img {
            width: 100%;
        }
    </style>
    <title>getElementById 的試驗</title>
</head>

<body>
    <div id="aaa">
        <div id="bbb">
            <div id="ccc">123</div>
        </div>
    </div>

    <div id="ddd"></div>


    <script>
        let aaa = document.getElementById("aaa");
        console.log(aaa);
        let bbb = document.getElementById("bbb");
        console.log(bbb);
        let ccc = document.getElementById("ccc");
        console.log(ccc);

        ccc.innerHTML = "<h1>正 2</h1>"

        let ddd = document.getElementById("ddd");
        ddd.innerHTML = "<img src='https://images.pexels.com/photos/34960157/pexels-photo-34960157.jpeg'>"
    </script>
</body>

</html>
