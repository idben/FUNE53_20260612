<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container {
            display: flex;
            gap: 10px;
            /* justify-content: space-between; */
        }

        .block {
            /* display: inline-block; */
            width: 50px;
            height: 50px;
            background-color: #f1ad38;
            /* df/jcc/aic */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .active {
            background-color: #f01c1c;
            color: #ffffff;
            font-size: 40px;
        }

        .ctrl {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
    <title>Sibling 取平行層</title>
</head>

<body>
    <div class="container">
        <!-- .block*4.block$>{$} -->
        <div class="block block1">1</div>
        <div class="block block2 active">2</div>
        <div class="block block3">3</div>
        <div class="block block4">4</div>
    </div>
    <div class="ctrl">
        <button>向左一個</button>
        <button>向右一個</button>
    </div>

</body>

</html>
