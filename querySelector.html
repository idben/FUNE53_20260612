<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .menu {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 200px;
            height: 70px;
            background-color: #deed88;
            transition: all 1s;
        }

        .hidden {
            /* display: none; */
            width: 0;
            height: 0;
        }
    </style>
    <title>querySelector 的試驗</title>
</head>

<body>
    <div class="name1">
        <div class="name2">
            <div class="name3">
                <input type="text" name="userName" value="Ben" />
            </div>
        </div>
    </div>

    <div class="name4">
        <div class="name2">
            <div class="name3">
                <input type="text" name="userName" value="May" />
            </div>
        </div>
    </div>

    <div class="menu"></div>
    <button type="button">開關</button>


    <script>
        let btn = document.querySelector("button");
        let menu = document.querySelector(".menu");

        btn.onclick = function () {
            menu.classList.toggle("hidden");
        }



    </script>

    <script>
        // 找到複數的內容時, 會回傳第一個
        // 會回傳單數型態, 也就是 element 元素型態
        let div1 = document.querySelector("div");
        console.log(div1);
        // 用樣式選擇器抓一樣的元素
        let name1 = document.querySelector(".name1");
        console.log(name1);
        // 用程式判斷抓到的是不是一樣的東西
        console.log(name1 == div1);

        let div2 = document.querySelector(".name2");
        console.log(div2);
        let name2 = div1.querySelector("div");
        console.log(name2);
        console.log(name2 == div2);

        let value1 = document.querySelector("input");
        console.log(value1.value);
        let value2 = name2.querySelector("input");
        console.log(value2.value);
        // 屬性選擇器
        let value3 = document.querySelector("[name=userName]");
        console.log(value3.value);
        // 標籤選擇器 + 屬性選擇器
        let value4 = document.querySelector("input[name=userName]");
        console.log(value4.value);
        // 標籤選擇器 + 屬性選擇器
        let value5 = document.querySelector(".name4 input[name=userName]");
        console.log(value5.value);




    </script>
</body>

</html>
